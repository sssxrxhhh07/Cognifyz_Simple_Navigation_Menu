<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navigation Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f3ee;
      --dark:      #1c1812;
      --accent:    #c0392b;
      --muted:     #9e9488;
      --border:    #e0d9d0;
      --nav-h:     72px;
    }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ══════════════════════════════
       NAV
    ══════════════════════════════ */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      animation: slideDown 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Logo */
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.45rem;
      letter-spacing: 0.04em;
      color: var(--dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      list-style: none;
    }

    .nav-links li {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .nav-links li:nth-child(1) { animation-delay: 0.15s; }
    .nav-links li:nth-child(2) { animation-delay: 0.25s; }
    .nav-links li:nth-child(3) { animation-delay: 0.35s; }

    .nav-links a {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 22px;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.22s;
    }

    /* Underline bar */
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 22px; right: 22px;
      height: 1.5px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--dark);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    /* Active dot indicator */
    .nav-links a.active .link-dot {
      opacity: 1;
    }

    .link-dot {
      width: 4px; height: 4px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Divider between logo and links */
    .nav-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 32px 0 0;
    }

    /* Right slot */
    .nav-right {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.45s;
    }

    .btn-cta {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--dark);
      border: none;
      padding: 10px 22px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn-cta:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    /* ══════════════════════════════
       HAMBURGER (mobile)
    ══════════════════════════════ */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--dark);
      transition: transform 0.3s, opacity 0.3s;
    }

    /* open state */
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ══════════════════════════════
       MOBILE DRAWER
    ══════════════════════════════ */
    @media (max-width: 640px) {
      nav { padding: 0 24px; }

      .nav-divider, .nav-right { display: none; }

      .hamburger { display: flex; }

      .nav-links {
        position: fixed;
        top: var(--nav-h);
        left: 0; right: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.22,1,0.36,1),
                    padding 0.35s ease;
      }

      .nav-links.open {
        max-height: 300px;
        padding: 16px 0 24px;
      }

      .nav-links li { opacity: 1; animation: none; }

      .nav-links a {
        padding: 14px 28px;
        font-size: 0.78rem;
      }
      .nav-links a::after { display: none; }
    }

    /* ══════════════════════════════
       HERO (demo content)
    ══════════════════════════════ */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 160px;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.5s;
    }

    .hero-label {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 5rem);
      line-height: 1.08;
      color: var(--dark);
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-rule {
      width: 40px; height: 1px;
      background: var(--accent);
      margin: 4px auto;
    }

    .hero p {
      max-width: 360px;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════
       KEYFRAMES
    ══════════════════════════════ */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ═══ NAV ═══ -->
  <nav>
    <a href="#" class="logo">
      <span class="logo-dot"></span>
      Maison
    </a>

    <div class="nav-divider" aria-hidden="true"></div>

    <ul class="nav-links" id="navLinks">
      <li>
        <a href="#" class="active">
          <span class="link-dot"></span>Work
        </a>
      </li>
      <li>
        <a href="#">
          <span class="link-dot"></span>About
        </a>
      </li>
      <li>
        <a href="#">
          <span class="link-dot"></span>Journal
        </a>
      </li>
    </ul>

    <div class="nav-right">
      <a href="#" class="btn-cta">Contact</a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ═══ DEMO CONTENT ═══ -->
  <section class="hero">
    <p class="hero-label">Creative Studio</p>
    <h1>Crafted with<br><em>intention.</em></h1>
    <div class="hero-rule"></div>
    <p>A minimal studio building beautiful things for the web — click the nav links above to see the active state in action.</p>
  </section>

  <script>
    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
    });

    // Active link switching
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        // close drawer on mobile
        navLinks.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      });
    });
  </script>
</body>
</html>
